<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        
        body{
           background:rgb(226, 227, 227);
           display:flex;
           justify-content:center;
           align-items:center;
           height:100vh;
        }

        .content{
            width: 330px;
            background-color: white;
            border: none;
            padding: 35px;
            margin: 100px auto;
            border-radius: 20px;
        }
        h1{
            color: #222;
            margin-bottom: 10px;
        }

        p{
            color:gray;
            margin-bottom: 25px;
        }

        input{
           width: 270px;
          padding: 14px;
          margin-bottom: 15px;
          border-radius: 8px;
          border: 1px solid gray;
        }

        button{
            width:100%;
            padding:14px;
            background-color:#2563eb;
            color:white;
            border:none;
            border-radius:25px;
            font-size:16px;
        }

        .login{
            margin-top: 20px;
            font-size: 15px;
        }
        
    </style>
</head>
<body>

 <div class="content">
        <h1>Sign up</h1>
        <p>Create a free account with your email</p>

  <form>
    <input type="Full Name" placeholder="Full Name"> <br>
   <input type="Email" placeholder="Email"> <br>
    <input type="Password" placeholder="Password"> <br>
    <button type="submit">Sign up</button>
   </form>
   
   <div class="login">
     Have an account?
    <a href="Log in">Log in</a>
   </div> 
   
 </div>
</body>
</html>
